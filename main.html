<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Testimonial Section</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .testimonial {
      background-color: #ffffff;
      border: 1px solid #ddd;
      padding: 20px;
      margin: 20px;
      border-radius: 8px;
    }

    .author {
      text-align: right;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Testimonials</h1>

  <div class="testimonial">
    <p>"This service is amazing!"</p>
    <p class="author">- John Doe</p>
  </div>

  <div class="testimonial">
    <p>"Highly recommended!"</p>
    <p class="author">- Jane Smith</p>
  </div>

</body>
</html>
