<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Testimonial Section</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Main Container */
    .testimonial-section {
      padding: 20px;
      background-color: #f5f5f5;
    }

    /* Individual Testimonial */
    .testimonial {
      background-color: #ffffff;
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    /* Testimonial Text */
    .testimonial p {
      margin: 0 0 10px;
      font-size: 16px;
      color: #333;
    }

    /* Author Styling */
    .author {
      text-align: right;
      font-style: italic;
      color: #555;
    }
  </style>
</head>
<body>

   <div class="testimonial-section"> 
    
    <div class="testimonial">
      <p>"This service is amazing! It completely changed my workflow and saved me so much time."</p>
      <p class="author">- John Doe</p>
    </div>

    <div class="testimonial">
      <p>"Highly recommend this to anyone looking for quality and reliability."</p>
      <p class="author">- Jane Smith</p>
    </div>

    <div class="testimonial">
      <p>"Excellent support and fantastic features. Worth every penny!"</p>
      <p class="author">- Alex Johnson</p>
    </div>

  </div>

</body>
</html>
